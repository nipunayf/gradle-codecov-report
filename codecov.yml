# Codecov Configuration
# This file configures code coverage reporting and test analytics for the ETL pipeline project

# Coverage settings
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
        if_ci_failed: error
    patch:
      default:
        target: auto
        threshold: 1%
        informational: false
        if_ci_failed: error

  # Precision for coverage percentages
  precision: 2
  round: down
  range: "70...100"

# Comment settings - appears on pull requests
comment:
  layout: "header, diff, flags, components, tree"
  behavior: default
  require_changes: false
  require_base: true
  require_head: true

# Annotations - show line-by-line coverage on PR diffs
github_checks:
  annotations: true

fixes:
  - "com/etl/extract/::extract/src/main/java/com/etl/extract/"
  - "com/etl/transform/::transform/src/main/java/com/etl/transform/"
  - "com/etl/load/::load/src/main/java/com/etl/load/"
  - "com/etl/runner/::runner/src/main/java/com/etl/runner/"

# Flag configuration for separating Gradle submodules
flags:
  extract:
    carryforward: true
    paths:
      - extract/src/main/java/
  transform:
    carryforward: true
    paths:
      - transform/src/main/java/
  load:
    carryforward: true
    paths:
      - load/src/main/java/
  runner:
    carryforward: true
    paths:
      - runner/src/main/java/

# Ignore paths that shouldn't be counted in coverage
ignore:
  - "**/test/**"
  - "**/build/**"
  - "**/*.gradle"
  - "gradle/**"
