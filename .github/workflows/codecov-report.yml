name: Codecov Report

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        if: ${{ env.ACT != 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for accurate coverage comparison

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew testCoverage --no-daemon
        continue-on-error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && env.ACT != 'true' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-test-results
          verbose: true

      - name: Upload extract coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./extract/build/reports/jacoco/codecov/jacocoTestReport.xml
          flags: extract
          name: codecov-extract
          disable_search: true
          dry_run: ${{ env.ACT == 'true' }}
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload transform coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./transform/build/reports/jacoco/codecov/jacocoTestReport.xml
          flags: transform
          name: codecov-transform
          disable_search: true
          dry_run: ${{ env.ACT == 'true' }}
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload load coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./load/build/reports/jacoco/codecov/jacocoTestReport.xml
          flags: load
          name: codecov-load
          disable_search: true
          dry_run: ${{ env.ACT == 'true' }}
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload runner coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./runner/build/reports/jacoco/codecov/jacocoTestReport.xml
          flags: runner
          name: codecov-runner
          disable_search: true
          dry_run: ${{ env.ACT == 'true' }}
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate test and coverage summary
        if: always()
        run: |
          echo "=== Test Results Summary ==="
          if [ -d "extract/build/test-results/test" ] || [ -d "transform/build/test-results/test" ] || [ -d "load/build/test-results/test" ] || [ -d "runner/build/test-results/test" ]; then
            echo "✅ Test results generated successfully"
            echo "📋 Test result locations:"
            for module in extract transform load runner; do
              if [ -d "${module}/build/test-results/test" ]; then
                echo "   - ${module}/build/test-results/test/"
              fi
            done
          else
            echo "⚠️ No test results found"
          fi

          echo ""
          echo "=== Coverage Report Summary ==="
          if [ -f "build/reports/jacoco/test/jacocoTestReport.xml" ]; then
            echo "✅ Coverage report generated successfully"
            echo "📊 Report location: build/reports/jacoco/test/html/index.html"
          else
            echo "⚠️ Coverage report not found"
          fi
